<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Promoção Rede Gospel</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial Black', sans-serif;
      background: linear-gradient(135deg, #4B0082, #6A0DAD);
      color: #FFFFFF;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.8em;
      margin-bottom: 10px;
      color: #FFD700;
      text-shadow: 2px 2px #000;
    }

    h2 {
      font-size: 2em;
      margin: 20px 0;
    }

    .highlight {
      background-color: #FFD700;
      color: #4B0082;
      padding: 12px 24px;
      font-size: 1.5em;
      border-radius: 10px;
      display: inline-block;
      margin-top: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .limited {
      margin-top: 20px;
      font-size: 1.5em;
      font-weight: bold;
      color: #FF4500;
      animation: blink 1.2s infinite alternate;
    }

    @keyframes blink {
      from { opacity: 1; }
      to { opacity: 0.3; }
    }

    .whatsapp-button {
      margin-top: 40px;
      display: inline-block;
      background-color: #25D366;
      color: white;
      font-size: 1.5em;
      padding: 15px 30px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: background-color 0.3s ease;
    }

    .whatsapp-button:hover {
      background-color: #1ebe5d;
    }

    @media screen and (max-width: 600px) {
      h1 {
        font-size: 2em;
      }

      h2 {
        font-size: 1.5em;
      }

      .highlight {
        font-size: 1.2em;
      }

      .limited {
        font-size: 1.2em;
      }

      .whatsapp-button {
        font-size: 1.2em;
        padding: 12px 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎙️ Rede Gospel Pelotas</h1>
    <h2>✨ Espaço disponível para novos programadores</h2>
    <div class="highlight">🎉 Promoção Exclusiva!</div>
    <div class="limited">🚨 Corra! Vagas Limitadas!</div>
    
    <!-- BOTÃO DO WHATSAPP COM MENSAGEM -->
    <a class="whatsapp-button"
       href="https://wa.me/5553999562524?text=Ol%C3%A1%2C%20vi%20a%20promo%C3%A7%C3%A3o%20da%20Rede%20Gospel%20e%20quero%20saber%20mais!"
       target="_blank">
      📲 Fale agora pelo WhatsApp
    </a>
  </div>
</body>
</html>
